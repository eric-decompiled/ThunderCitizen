# Production docker-compose for ThunderCitizen.
#
# Stack:
#   init  → one-shot. Generates ./secrets/postgres_password if missing.
#   db    → postgis/postgis, no host port. Reads password via POSTGRES_PASSWORD_FILE.
#   app   → published GHCR image, no host port. Builds DATABASE_URL from the
#           secret file at startup via a tiny entrypoint wrapper.
#   caddy → terminates TLS (auto-issues + auto-renews via Let's Encrypt),
#           proxies HTTPS to the app on the internal compose network.
#
# Secrets:
#   The Postgres password is GENERATED on first boot by the `init` service
#   (64 hex chars from /dev/urandom) and stashed at ./secrets/postgres_password
#   on the host. Both `db` and `app` mount that directory read-only at
#   /run/secrets and read the file directly. To rotate the password, stop
#   the stack, delete the file (and the postgres data volume if you also want
#   to reset the DB), and bring the stack back up.
#
# Differences from docker-compose.yml (local dev):
#   - Pulls the published image from GHCR instead of building locally
#   - Postgres has NO published ports (only reachable inside the compose network)
#   - App has NO published ports (only reachable via caddy)
#   - Caddy publishes 80/443 and handles TLS automatically — no Caddyfile in
#     the repo, the config is inlined below
#   - Every env var has a sensible default — the stack can come up with an
#     empty .env (just override what you actually need)
#   - restart: unless-stopped on every long-running service
#
# Prerequisites for TLS to work:
#   - DNS A/AAAA records for every hostname in the Caddyfile below point at
#     this host. Currently:
#       thundercitizen.ca, www.thundercitizen.ca    (canonical site)
#       thundercitizen.com, www.thundercitizen.com  (302 → thundercitizen.ca)
#   - Ports 80 and 443 are open (Let's Encrypt's HTTP-01 challenge needs 80)
#
# If any hostname's DNS isn't live yet, Caddy will fail to issue that SAN's
# cert but the other site block still works. Log lines like "obtain: acme:
# Could not reach host" indicate the problem hostname; remove it from the
# Caddyfile temporarily or wait for DNS to propagate.
#
# Usage:
#   1. (Optional) Copy this block into a `.env` file beside this compose file
#      and override any defaults you don't like — none of these are required:
#
#        ACME_EMAIL=ops@thundercitizen.ca     # default if unset
#        POSTGRES_USER=thundercitizen         # default if unset
#        POSTGRES_DB=thundercitizen           # default if unset
#        BASE_URL=https://thundercitizen.ca   # default if unset
#        # Pin to a specific build for reproducibility. `latest` and `main`
#        # move with each push to main; `sha-<short>` is immutable.
#        TC_IMAGE_TAG=sha-3d84894             # default: latest
#
#   The canonical domain is hardcoded in the Caddyfile content below (not
#   an env var) because changing it requires also updating the redirect
#   block's target — a mistake better caught by editing the file than by
#   setting a shell variable wrong.
#
#   2. Bring it up:
#
#        docker compose -f docker-compose.prod.yml --env-file .env up -d
#
#      First boot: `init` generates ./secrets/postgres_password, db comes up
#      with that password, app reads the same file to build DATABASE_URL,
#      caddy gets a Let's Encrypt cert. Watch it happen:
#
#        docker compose -f docker-compose.prod.yml logs -f
#
#   3. Apply data patches once after first boot (they are intentionally NOT
#      in the image — see the Dockerfile header). Easiest path:
#
#        for f in patches/*.sql; do
#          docker compose -f docker-compose.prod.yml exec -T db \
#            psql -U thundercitizen -d thundercitizen < "$f"
#        done
#
#      (This bypasses the patches CLI's tracking table — fine for first apply.)

# Distinct project name so prod containers, networks, and volumes never
# collide with the dev stack (`docker-compose.yml`, project `thundercitizen`).
# Containers become `thundercitizen-prod-db-1`, etc.
name: thundercitizen-prod

# Shared logging config applied to every long-running service. json-file
# with a 20m × 5-file rolling cap (~100MB per container). Caddy's access
# log does NOT use this — it writes to a bind-mounted file with daily
# rotation and a hard 7-day TTL (see the `log` block in the Caddyfile).
# Only Caddy's server/cert events land here.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

configs:
  caddyfile:
    # Compose interpolates ${VAR} at parse time, baking the values into the
    # config object. Re-run `docker compose up -d --force-recreate caddy`
    # to pick up changes (a plain `restart` won't see them — the config
    # is baked into the container at create time, not read from disk).
    content: |
      {
          email ${ACME_EMAIL:-ops@thundercitizen.ca}
      }

      # Canonical site — thundercitizen.ca and its www alias share one cert
      # (Let's Encrypt issues a single cert with both as SANs).
      thundercitizen.ca, www.thundercitizen.ca {
          # Minimum-data access log. Keeps: timestamp, remote IP, method,
          # path (without query string), status, duration, User-Agent.
          # Drops: Referer, Cookie, Authorization headers and the query
          # string portion of the URI. Static-asset requests are skipped —
          # high volume, no operational value.
          #
          # Retention: roll_at 05:00 rotates a fresh file every day at
          # 00:00 Eastern Standard Time (05:00 UTC — the host runs in
          # UTC per harden.sh). roll_keep_for 168h deletes rotated
          # files older than 7 days at the next rotation. roll_size
          # 100mb is a safety cap in case daily volume ever spikes.
          # This gives a hard, advertiseable "no log entry older than
          # 7 days" promise.
          log {
              output file /var/log/caddy/access.log {
                  roll_at 05:00
                  roll_size 100mb
                  roll_keep 10
                  roll_keep_for 168h
              }
              format filter {
                  wrap json
                  fields {
                      request>headers>Referer delete
                      request>headers>Cookie delete
                      request>headers>Authorization delete
                      request>uri regexp "\?.*" ""
                  }
              }
          }
          log_skip /static/*
          encode zstd gzip

          reverse_proxy app:8080

          # Caddy-level error page for 5xx. Fires when the app is unreachable
          # (502 Bad Gateway from reverse_proxy) or when caddy itself errors.
          # The app handles its own 404s in-template for perfect theming —
          # those flow through the reverse_proxy unchanged.
          handle_errors {
              @5xx expression `{err.status_code} >= 500`
              handle @5xx {
                  root * /srv
                  rewrite * /502.html
                  # templates directive turns the served file into a Go
                  # template with access to the request — lets 502.html
                  # reflect path/method/UA/language/referer back at the
                  # visitor for a bit of civic theatre. No IP, by design.
                  templates
                  file_server
              }
          }
      }

      # Legacy / alias hostnames — 302 Temporary Redirect to the canonical
      # .ca URL, preserving path and query string via {uri}. Using temporary
      # instead of permanent on purpose: browsers aggressively cache 301s
      # (forever, often without honoring TTL), and while .ca is still
      # settling we want to be able to roll this back without users being
      # stuck on a cached redirect. Switch to `permanent` once confident.
      thundercitizen.com, www.thundercitizen.com {
          redir https://thundercitizen.ca{uri} temporary
      }

  # Themed 5xx page served by caddy when the app is unreachable. Fully
  # self-contained (inline CSS, no external fonts/scripts) because the app
  # — which hosts /static — is by definition down when this fires.
  # Status code on this response is 200, not the upstream 5xx: file_server
  # doesn't preserve err.status_code. Acceptable tradeoff; the HTML makes
  # the state obvious to humans, and the upstream 5xx is already logged.
  error_502:
    content: |
      <!doctype html>
      <html lang="en">
      <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>502 &middot; Thunder Citizen</title>
      <style>
       :root{--bg:#0d1a0d;--fg:#4ade80;--dim:#2a5a3a;--bright:#86efac;--err:#f87171;--warn:#fbbf24;--glow:0 0 8px rgba(74,222,128,.4)}
       *{box-sizing:border-box}
       html,body{margin:0;min-height:100%}
       body{background:var(--bg);color:var(--fg);font:14px/1.55 ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;padding:2.5rem 1rem;overflow-x:hidden}
       body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.22) 2px 3px);z-index:1}
       main{max-width:720px;margin:0 auto;position:relative;z-index:2}
       h1{font-size:.95rem;letter-spacing:.12em;color:var(--bright);text-shadow:var(--glow);margin:0 0 1.25rem;text-transform:uppercase}
       .box{border:1px solid var(--dim);padding:1rem 1.25rem;margin-bottom:1.25rem;background:rgba(0,0,0,.25)}
       pre{margin:0;white-space:pre-wrap;font:inherit}
       .dim{color:var(--dim)}
       .err{color:var(--err)}
       .warn{color:var(--warn)}
       .ok{color:var(--bright)}
       .prompt::before{content:"$ ";color:var(--bright)}
       .cursor::after{content:"\25AE";margin-left:.25rem;color:var(--bright);text-shadow:var(--glow);animation:b 1.1s steps(2) infinite}
       @keyframes b{50%{opacity:0}}
       a{color:var(--bright);text-shadow:var(--glow);text-decoration:none;border-bottom:1px dashed var(--dim)}
       a:hover{background:var(--bright);color:var(--bg);text-shadow:none;border-bottom-color:transparent}
      </style>
      </head>
      <body>
      <main>
       <h1>&#9889; Thunder Citizen &mdash; 502 Bad Gateway</h1>
       <div class="box"><pre><span class="dim">[  0.000000]</span> <span class="ok">boot  </span> thundercitizen.service starting
      <span class="dim">[  0.000042]</span> <span class="ok">db    </span> postgres is ready
      <span class="dim">[  0.133742]</span> <span class="warn">quorum</span> checking for councillors...
      <span class="dim">[  1.010203]</span> <span class="warn">quorum</span> no councillors present
      <span class="dim">[  1.404040]</span> <span class="err">ERROR </span> motion to adjourn carried 1-0
      <span class="dim">[  1.502502]</span> <span class="err">FATAL </span> upstream has left the chamber</pre></div>
       <div class="box"><pre><span class="prompt"></span>systemctl status thundercitizen
      <span class="ok">&#9679;</span> thundercitizen.service &mdash; civic research daemon
         <span class="dim">Active:</span> <span class="err">failed</span> (Result: bad-gateway)
         <span class="dim">Cause: </span> upstream is taking a long lunch by Lake Superior
         <span class="dim">Remedy:</span> wait a minute. the gulls always come home.</pre></div>
       <p class="cursor"><span class="prompt"></span>retry in 30s &mdash; or <a href="/">return home</a></p>
      </main>
      <!--
              _
             / \   motion to adjourn: carried, 1-0.
            /   \  thunder citizen is napping.
           /_____\ the uplink is fine, the daemon is not.
      -->
      </body>
      </html>

services:
  init:
    # Generates ./secrets/postgres_password on first boot. Idempotent — on
    # subsequent ups it sees the existing file and exits 0 immediately.
    image: alpine:3
    restart: "no"
    volumes:
      - ./secrets:/secrets
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -s /secrets/postgres_password ]; then
          head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n' > /secrets/postgres_password
          chmod 644 /secrets/postgres_password
          echo "[init] generated ./secrets/postgres_password (64 hex chars)"
        else
          echo "[init] ./secrets/postgres_password already present, skipping"
        fi

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thundercitizen}
      POSTGRES_DB: ${POSTGRES_DB:-thundercitizen}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./secrets:/run/secrets:ro
      - ./backups:/backups        # bind mount for ./scripts/backup.sh
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thundercitizen} -d ${POSTGRES_DB:-thundercitizen}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No `ports:` — Postgres is only reachable from other services on the
    # default compose network (i.e. the `app` container, as host `db`).

  app:
    image: ghcr.io/thundercitizen/home:${TC_IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thundercitizen}
      POSTGRES_DB: ${POSTGRES_DB:-thundercitizen}
      PORT: "8080"
      ENVIRONMENT: production
      # Canonical public origin used to build absolute og:url / og:image
      # URLs for link-preview scrapers (Slack, Discord, Facebook, Twitter,
      # LinkedIn, iMessage). Override in .env for staging deploys:
      #   BASE_URL=https://staging.thundercitizen.ca
      BASE_URL: ${BASE_URL:-https://thundercitizen.ca}
      # Surfaced on /health so operators can see exactly which image is
      # running. Docker doesn't expose the running image ref to the
      # container, so we bake it in at compose parse time from the
      # same TC_IMAGE_TAG variable that selects the image above.
      TC_IMAGE: ghcr.io/thundercitizen/home:${TC_IMAGE_TAG:-latest}
    volumes:
      - ./secrets:/run/secrets:ro
    # The published image's ENTRYPOINT is /usr/local/bin/server. Override it
    # with a tiny shell wrapper that reads the password from the secret file
    # and builds DATABASE_URL at startup, then execs the server.
    # $$ is compose's escape for a literal $ — the shell sees $POSTGRES_USER
    # and reads it from the container's env at runtime.
    entrypoint:
      - sh
      - -c
      - |
        DB_PASS=$$(cat /run/secrets/postgres_password)
        export DATABASE_URL="postgres://$$POSTGRES_USER:$$DB_PASS@db:5432/$$POSTGRES_DB?sslmode=disable"
        exec /usr/local/bin/server
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      # wget --spider issues a HEAD which the route didn't accept (405) — use
      # GET and verify the body says "OK" so a drifted endpoint doesn't pass.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -qx OK"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # No `ports:` — caddy reaches the app as `app:8080` on the compose network.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
      - source: error_502
        target: /srv/502.html
    volumes:
      - caddy_data:/data       # cert storage — MUST persist or you'll hit LE rate limits
      - caddy_config:/config
      - ./caddy-logs:/var/log/caddy  # bind mount so operator can tail from the host; rotated by Caddy, max age 7 days
    depends_on:
      app:
        condition: service_healthy

volumes:
  # No explicit `name:` — compose auto-prefixes with the project name
  # `thundercitizen-prod`, yielding `thundercitizen-prod_postgres_data`, etc.
  postgres_data:
  caddy_data:
  caddy_config:
