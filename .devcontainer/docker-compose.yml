services:
  app:
    image: mcr.microsoft.com/devcontainers/go:1.25
    volumes:
      - ..:/workspaces/ThunderCitizen:cached
    ports:
      - "8080:8080"
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: ..
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thundercitizen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thundercitizen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
