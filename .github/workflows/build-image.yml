name: build-image

# Build a Debian-bookworm-based container image with the ThunderCitizen
# server + operator tools and publish it to GitHub Container Registry.
#
# Triggers:
#   - push to main      → builds and pushes :latest, :main, :sha-<short>
#   - push to v* tags   → builds and pushes :v1.2.3, :1.2, :1, :latest
#   - manual dispatch   → builds and pushes with the ref-derived tags
#
# Patch SQL files are downloaded at runtime from data.thundercitizen.ca
# (DO Spaces). Migrations ARE bundled because the server runs them on
# startup via golang-migrate.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest only on main; tag-derived semver on v*.*.*
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ThunderCitizen
            org.opencontainers.image.description=Civic transparency platform for Thunder Bay
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Compute build timestamp
        id: build_time
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.ts }}
